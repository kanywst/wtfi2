name: Claude

# Interactive assistant: mention @claude in an issue or PR comment and it
# responds with the full repo/PR context. Same subscription-based auth as the
# review workflow (CLAUDE_CODE_OAUTH_TOKEN, held in the environment of that name).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claude:
    # Only wake up when someone actually mentions @claude.
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    environment: CLAUDE_CODE_OAUTH_TOKEN
    env:
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5
        if: env.HAS_TOKEN == 'true'

      - uses: anthropics/claude-code-action@v1
        if: env.HAS_TOKEN == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
