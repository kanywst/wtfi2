name: Claude Review

# Automatic review on every PR, running on your Claude Pro/Max subscription
# (no pay-per-token API key needed). Auth uses CLAUDE_CODE_OAUTH_TOKEN, which
# you generate locally with `claude setup-token` and add as a repo secret.
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip if the token secret isn't configured yet, so PRs aren't blocked.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            Review this pull request. It's a macOS network-diagnostic TUI CLI
            written in Rust (ratatui + tokio). Focus on:
            - correctness bugs and wrong diagnoses (false OK / false BROKEN)
            - parser edge cases over system_profiler / route / scutil output
            - async orchestration and the tokio::select! render loop
            - panics that could leave the terminal in a broken state
            Be concise and only flag real issues; skip nitpicks.
