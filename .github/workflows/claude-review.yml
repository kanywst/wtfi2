name: Claude Review

# Automatic review on every PR, running on your Claude Pro/Max subscription
# (no pay-per-token API key needed). Auth uses CLAUDE_CODE_OAUTH_TOKEN, held in
# the environment of the same name (generate it with `claude setup-token`).
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # The OAuth token lives in this environment's secrets.
    environment: CLAUDE_CODE_OAUTH_TOKEN
    # Only for same-repo PRs (fork PRs can't see the secret anyway).
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      # Empty when the secret is unset — lets us skip gracefully (green)
      # instead of hard-failing the check on repos without the token.
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - name: Note missing token
        if: env.HAS_TOKEN != 'true'
        run: echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not set — skipping Claude review."

      - uses: actions/checkout@v5
        if: env.HAS_TOKEN == 'true'
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        if: env.HAS_TOKEN == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            Review this pull request. It's a macOS network-diagnostic TUI CLI
            written in Rust (ratatui + tokio). Focus on:
            - correctness bugs and wrong diagnoses (false OK / false BROKEN)
            - parser edge cases over system_profiler / route / scutil output
            - async orchestration and the tokio::select! render loop
            - panics that could leave the terminal in a broken state
            Be concise and only flag real issues; skip nitpicks.
