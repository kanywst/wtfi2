version: 2
updates:
  # Rust dependencies.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch routine minor/patch bumps into one PR to cut noise.
      cargo-minor:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
